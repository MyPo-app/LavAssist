<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Which Woman of the Bible Are You? · BOLD Women Entrepreneurs</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  :root {
    --blush:        #f5e6e0;
    --blush-mid:    #edd5cb;
    --blush-dark:   #e0bfb3;
    --rosegold:     #b87c6a;
    --rosegold-mid: #c9907e;
    --rosegold-deep:#8a5244;
    --rosegold-light:#e8b4a4;
    --brown-warm:   #6b3f30;
    --text-dark:    #3d2318;
    --text-mid:     #7a4d3d;
    --text-light:   #b08070;
    --white:        #fdf8f6;
    --card:         rgba(253,248,246,0.96);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    background:
      radial-gradient(ellipse at 15% 0%,   #f0d8d0 0%, transparent 55%),
      radial-gradient(ellipse at 85% 100%, #e8cfc4 0%, transparent 55%),
      linear-gradient(170deg, #f5e6e0 0%, #eeddd4 50%, #e8d0c4 100%);
    display: flex;
    align-items: flex-start;
    justify-content: center;
    padding: 0 0 70px;
    font-family: 'Jost', sans-serif;
    color: var(--text-dark);
    position: relative;
    overflow-x: hidden;
  }

  /* Decorative background florals */
  body::before, body::after {
    content: '';
    position: fixed;
    pointer-events: none;
    opacity: 0.07;
    background-repeat: no-repeat;
    background-size: contain;
  }

  /* Floating petal dots */
  .petal {
    position: fixed;
    border-radius: 50% 0 50% 0;
    background: var(--rosegold-mid);
    opacity: 0.08;
    pointer-events: none;
    animation: floatPetal linear infinite;
  }

  @keyframes floatPetal {
    0%   { transform: translateY(0) rotate(0deg);   opacity: 0; }
    10%  { opacity: 0.08; }
    90%  { opacity: 0.06; }
    100% { transform: translateY(-100vh) rotate(360deg); opacity: 0; }
  }

  .container {
    width: 100%;
    max-width: 540px;
    position: relative;
    z-index: 1;
    padding: 0 18px;
  }

  /* ── HEADER ── */
  .header {
    text-align: center;
    padding: 44px 0 32px;
    animation: fadeUp 0.8s ease both;
  }

  .brand-badge {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, var(--rosegold-mid), var(--rosegold));
    color: white;
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    font-weight: 600;
    padding: 6px 16px;
    border-radius: 30px;
    margin-bottom: 20px;
    box-shadow: 0 4px 16px rgba(184,124,106,0.3);
  }

  .header h1 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(30px, 7vw, 46px);
    color: var(--text-dark);
    line-height: 1.15;
    margin-bottom: 6px;
  }
  .header h1 em {
    font-style: italic;
    color: var(--rosegold);
    font-weight: 400;
  }
  .header-sub {
    font-size: 11px;
    color: var(--text-light);
    font-weight: 300;
    letter-spacing: 2px;
    text-transform: uppercase;
    margin-top: 12px;
  }

  .ornament {
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
    margin: 16px 0 0;
    opacity: 0.5;
  }
  .ornament-line {
    width: 40px;
    height: 1px;
    background: var(--rosegold);
  }
  .ornament-diamond {
    width: 5px; height: 5px;
    background: var(--rosegold);
    transform: rotate(45deg);
  }

  /* ── CARD ── */
  .card {
    background: var(--card);
    border-radius: 24px;
    border: 1px solid rgba(184,124,106,0.18);
    padding: 36px 30px;
    box-shadow:
      0 10px 50px rgba(138,82,68,0.12),
      0 2px 10px rgba(138,82,68,0.06),
      inset 0 1px 0 rgba(255,255,255,0.8);
    transition: opacity 0.28s ease, transform 0.28s ease;
    animation: fadeUp 0.6s ease both 0.15s;
  }
  .card.fade-out { opacity: 0; transform: translateY(12px); }

  /* ── PROGRESS ── */
  .progress-row {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 10px;
  }
  .progress-label {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--text-light);
    font-weight: 400;
  }
  .progress-pct {
    font-family: 'Cormorant Garamond', serif;
    font-size: 14px;
    color: var(--rosegold);
    font-style: italic;
  }
  .progress-bar-bg {
    height: 3px;
    background: var(--blush-dark);
    border-radius: 2px;
    margin-bottom: 28px;
    overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--rosegold-light), var(--rosegold), var(--rosegold-deep));
    border-radius: 2px;
    transition: width 0.55s cubic-bezier(0.4,0,0.2,1);
  }

  /* ── QUESTION ── */
  .question-text {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: clamp(21px, 4.5vw, 29px);
    color: var(--text-dark);
    line-height: 1.35;
    margin-bottom: 24px;
    text-align: center;
  }

  /* ── OPTIONS ── */
  .options { display: flex; flex-direction: column; gap: 9px; margin-bottom: 22px; }

  .option-btn {
    background: var(--white);
    border: 1.5px solid rgba(184,124,106,0.16);
    border-radius: 14px;
    padding: 13px 15px;
    color: var(--text-mid);
    text-align: left;
    cursor: pointer;
    font-size: 13.5px;
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    letter-spacing: 0.2px;
    line-height: 1.55;
    transition: all 0.2s ease;
    display: flex;
    align-items: center;
    gap: 13px;
    width: 100%;
  }
  .option-btn:hover {
    background: #fdf0ea;
    border-color: var(--rosegold-mid);
    transform: translateY(-1px);
    box-shadow: 0 4px 16px rgba(184,124,106,0.13);
  }
  .option-btn.selected {
    background: linear-gradient(135deg, #f8e4dc, #f2d4c6);
    border-color: var(--rosegold);
    color: var(--brown-warm);
    box-shadow: 0 4px 18px rgba(184,124,106,0.2);
  }

  .option-check {
    width: 22px; height: 22px; min-width: 22px;
    border-radius: 6px;
    border: 1.5px solid var(--blush-dark);
    background: white;
    display: flex; align-items: center; justify-content: center;
    font-size: 12px;
    font-weight: 700;
    color: white;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .option-btn.selected .option-check {
    background: linear-gradient(135deg, var(--rosegold-mid), var(--rosegold));
    border-color: var(--rosegold);
    box-shadow: 0 2px 8px rgba(184,124,106,0.3);
  }

  /* ── NEXT BUTTON ── */
  .next-btn {
    width: 100%;
    padding: 15px;
    background: linear-gradient(135deg, var(--rosegold-mid), var(--rosegold));
    border: none;
    border-radius: 14px;
    color: white;
    font-size: 11px;
    font-family: 'Jost', sans-serif;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.22s ease;
    box-shadow: 0 4px 20px rgba(184,124,106,0.25);
  }
  .next-btn:disabled {
    background: var(--blush-dark);
    color: var(--text-light);
    cursor: not-allowed;
    box-shadow: none;
  }
  .next-btn:not(:disabled):hover {
    background: linear-gradient(135deg, var(--rosegold), var(--rosegold-deep));
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(138,82,68,0.3);
  }

  /* ── ENNEAGRAM ── */
  .enneagram-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 9px;
  }
  .enneagram-btn {
    background: var(--white);
    border: 1.5px solid rgba(184,124,106,0.16);
    border-radius: 14px;
    padding: 13px 6px 11px;
    cursor: pointer;
    transition: all 0.2s ease;
    text-align: center;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    width: 100%;
  }
  .enneagram-btn .enn-num {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px;
    color: var(--rosegold);
    line-height: 1;
    font-weight: 400;
  }
  .enneagram-btn .enn-label {
    font-family: 'Jost', sans-serif;
    font-size: 8px;
    letter-spacing: 0.5px;
    text-transform: uppercase;
    color: var(--text-light);
    font-weight: 400;
    line-height: 1.3;
  }
  .enneagram-btn:hover {
    border-color: var(--rosegold-mid);
    background: #fdf0ea;
    transform: translateY(-2px);
    box-shadow: 0 4px 14px rgba(184,124,106,0.12);
  }
  .enneagram-btn.selected {
    background: linear-gradient(135deg, #f8e4dc, #f2d4c6);
    border-color: var(--rosegold);
    box-shadow: 0 4px 16px rgba(184,124,106,0.2);
  }
  .enneagram-btn.selected .enn-num { color: var(--brown-warm); }

  .dont-know-btn {
    width: 100%;
    margin-bottom: 22px;
    background: var(--white);
    border: 1.5px solid rgba(184,124,106,0.14);
    border-radius: 14px;
    padding: 13px 16px;
    color: var(--text-light);
    text-align: center;
    cursor: pointer;
    font-size: 13px;
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-style: italic;
    transition: all 0.2s ease;
    display: block;
    margin-top: 8px;
  }
  .dont-know-btn:hover, .dont-know-btn.selected {
    background: linear-gradient(135deg, #f8e4dc, #f2d4c6);
    border-color: var(--rosegold);
    color: var(--brown-warm);
  }

  /* ── RESULT ── */
  .result-card { text-align: center; animation: fadeUp 0.7s cubic-bezier(0.34,1.3,0.64,1) both; }

  .result-eyebrow {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-light);
    margin-bottom: 12px;
    font-weight: 500;
  }
  .result-tagline {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 15px;
    color: var(--rosegold);
    margin-bottom: 8px;
    letter-spacing: 0.3px;
  }
  .result-name {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: clamp(46px, 11vw, 68px);
    color: var(--text-dark);
    line-height: 1;
    margin-bottom: 14px;
    letter-spacing: 1px;
  }
  .result-emoji { font-size: 30px; margin-bottom: 6px; }

  .result-ornament {
    display: flex;
    align-items: center;
    gap: 10px;
    justify-content: center;
    margin: 18px 0;
  }
  .result-ornament-line { width: 48px; height: 1px; background: var(--rosegold-light); opacity: 0.6; }
  .result-ornament-diamond { width: 5px; height: 5px; background: var(--rosegold-light); transform: rotate(45deg); }

  .result-desc {
    font-family: 'Jost', sans-serif;
    font-size: 13.5px;
    font-weight: 300;
    line-height: 1.95;
    color: var(--text-mid);
    margin-bottom: 26px;
    text-align: left;
  }
  .result-desc strong {
    color: var(--rosegold-deep);
    font-weight: 600;
  }

  .scripture-box {
    background: linear-gradient(135deg, #fdf0ea, #f8e4da);
    border: 1px solid rgba(184,124,106,0.2);
    border-radius: 18px;
    padding: 24px 22px;
    margin-bottom: 26px;
    position: relative;
    overflow: hidden;
  }
  .scripture-box::before {
    content: '❝';
    position: absolute;
    top: 10px; left: 16px;
    font-size: 48px;
    color: var(--rosegold-light);
    opacity: 0.3;
    font-family: Georgia, serif;
    line-height: 1;
  }
  .scripture-label {
    font-size: 9px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--rosegold);
    margin-bottom: 12px;
    font-weight: 600;
  }
  .scripture-text {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-size: 17px;
    color: var(--text-dark);
    line-height: 1.75;
    margin-bottom: 12px;
    position: relative;
    z-index: 1;
  }
  .scripture-ref {
    font-size: 10px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--rosegold);
    font-weight: 600;
  }

  .result-footer {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }
  .bold-tag {
    font-size: 9px;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--text-light);
    font-weight: 400;
  }
  .bold-tag span {
    color: var(--rosegold);
    font-weight: 600;
  }
  .restart-btn {
    background: transparent;
    border: 1.5px solid var(--rosegold-mid);
    border-radius: 14px;
    color: var(--rosegold);
    padding: 13px 30px;
    font-size: 11px;
    font-family: 'Jost', sans-serif;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.22s ease;
  }
  /* ── BACK BUTTON ── */
  .nav-row {
    display: flex;
    align-items: center;
    justify-content: flex-start;
    margin-bottom: 20px;
  }
  .back-btn {
    display: flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #f8e4dc, #f2d4c6);
    border: 1.5px solid var(--rosegold-mid);
    border-radius: 30px;
    color: var(--rosegold-deep);
    font-size: 12px;
    font-family: 'Jost', sans-serif;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    padding: 9px 18px 9px 14px;
    transition: all 0.2s ease;
    box-shadow: 0 2px 10px rgba(184,124,106,0.15);
  }
  .back-btn:hover {
    background: linear-gradient(135deg, var(--rosegold-mid), var(--rosegold));
    color: white;
    transform: translateX(-2px);
    box-shadow: 0 4px 16px rgba(184,124,106,0.28);
  }
  .back-btn:hover svg path { stroke: white; }
  .back-btn svg { transition: transform 0.18s ease; flex-shrink: 0; }
  .back-btn:hover svg { transform: translateX(-2px); }
  .back-btn-spacer { height: 40px; }

  .restart-btn:hover {
    background: linear-gradient(135deg, var(--rosegold-mid), var(--rosegold));
    color: white;
    transform: translateY(-1px);
    box-shadow: 0 6px 20px rgba(184,124,106,0.28);
  }

  /* ── FOOTER BRAND ── */
  .footer-brand {
    text-align: center;
    padding: 28px 0 0;
    animation: fadeUp 0.8s ease both 0.2s;
  }
  .footer-brand p {
    font-size: 9px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--text-light);
    font-weight: 400;
  }
  .footer-brand strong {
    color: var(--rosegold);
    font-weight: 600;
    letter-spacing: 4px;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 480px) {
    .card { padding: 28px 18px; }
    .enneagram-grid { gap: 7px; }
  }

  .brand-logo {
    width: 150px;
    height: 150px;
    object-fit: contain;
    margin: 0 auto 10px;
    display: block;
    filter: drop-shadow(0 6px 20px rgba(184,124,106,0.25));
    animation: fadeUp 0.8s ease both;
  }

</style>
</head>

<!-- Floating petals -->
<script>
  for (let i = 0; i < 12; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    const s = 8 + Math.random() * 18;
    p.style.cssText = `
      width:${s}px; height:${s}px;
      left:${Math.random()*100}%;
      bottom:-${s}px;
      animation-duration:${14+Math.random()*20}s;
      animation-delay:${Math.random()*15}s;
    `;
    document.body.appendChild(p);
  }
</script>

    verse: '"Abigail lost no time… she went to meet David."',
    ref: "1 Samuel 25:18 (NIV)"
  },
  grace: {
    name: "Mary of Bethany",
    tagline: "She chose the better thing.",
    emoji: "🤍",
    desc: `You are <strong>Mary of Bethany</strong> — the one who chose presence over performance. In a world that rewards busyness, you've discovered the secret: <strong>everything flows from intimacy with God</strong>. Your business is built on overflow. Your worship is extravagant, your love is lavish, and you give your best without calculating the cost. Like Mary, you may be misunderstood by the Marthas around you — but Jesus <strong>defends your devotion</strong> every time. Your stillness is not laziness. It is strategy. It is from that quiet, sacred place that <strong>your greatest work is born.</strong>`,
    verse: '"She has done a beautiful thing to me… what she has done will be told in memory of her."',
    ref: "Matthew 26:10,13 (NIV)"
  },
  human: {
    name: "Sarah",
    tagline: "The matriarch. The mother of nations.",
    emoji: "⭐",
    desc: `You are <strong>Sarah</strong> — real, raw, and remarkable. You have laughed at God's promises when they felt impossible. You have taken matters into your own hands when the waiting grew too long. You have doubted, stumbled, and wondered if the word God spoke over your life was ever really meant for you. <strong>It was. It is.</strong> Like Sarah, you are the mother of something that doesn't fully exist yet — a business, a movement, a family legacy. God has not forgotten His promise to you. He renamed her. <strong>He will reframe your story too.</strong> Imperfect faith is still faith. And God moves through it every single time.`,
    verse: '"Is anything too hard for the Lord? At the appointed time… Sarah shall have a son."',
    ref: "Genesis 18:14 (ESV)"
  }
};

// answers[i] = computed result-value for question i
// rawSelections[i] = raw string selected (enneagram number or option value)
let current = 0;
let answers = new Array(questions.length).fill(null);
let rawSelections = new Array(questions.length).fill(null);
let selected = null; // raw selection for current question

function backBtn() {
  return current > 0
    ? `<button class="back-btn" onclick="goBack()">
        <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M10 3L5 8L10 13" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        ← Previous
      </button>`
    : `<div class="back-btn-spacer"></div>`;
}

function render() {
  const content = document.getElementById('quiz-content');
  const q = questions[current];
  const pct = Math.round((current / questions.length) * 100);

  // Restore prior selection if navigating back
  selected = rawSelections[current] || null;

  const progressBar = `
    <div class="progress-row">
      <span class="progress-label">Question ${current + 1} of ${questions.length}</span>
      <span class="progress-pct">${pct}%</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" style="width:${pct}%"></div>
    </div>
  `;

  const navRow = `
    <div class="nav-row">
      ${backBtn()}
    </div>
  `;

  if (q.type === 'enneagram') {
    const names = ['Reformer','Helper','Achiever','Individual','Investigator','Loyalist','Enthusiast','Challenger','Peacemaker'];
    content.innerHTML = `${progressBar}${navRow}
      <p class="question-text">${q.q}</p>
      <div class="enneagram-grid">
        ${[1,2,3,4,5,6,7,8,9].map(n => `
          <button class="enneagram-btn${selected===String(n)?' selected':''}" onclick="selectEnneagram('${n}',this)">
            <span class="enn-num">${n}</span>
            <span class="enn-label">${names[n-1]}</span>
          </button>
        `).join('')}
      </div>
      <button class="dont-know-btn${selected==='?'?' selected':''}" onclick="selectEnneagram('?',this)">
        I don't know my enneagram number
      </button>
      <button class="next-btn" id="next-btn" onclick="nextQuestion()" ${selected?'':'disabled'}>
        ${current+1===questions.length?'Reveal My Answer ✦':'Continue →'}
      </button>`;
    return;
  }

  content.innerHTML = `${progressBar}${navRow}
    <p class="question-text">${q.q}</p>
    <div class="options">
      ${q.options.map(opt=>`
        <button class="option-btn${selected===opt.value?' selected':''}" onclick="selectOption('${opt.value}',this)">
          <span class="option-check">${selected===opt.value?'✓':''}</span>
          ${opt.text}
        </button>`).join('')}
    </div>
    <button class="next-btn" id="next-btn" onclick="nextQuestion()" ${selected?'':'disabled'}>
      ${current+1===questions.length?'Reveal My Answer ✦':'Continue →'}
    </button>`;
}

function selectOption(value, btn) {
  selected = value;
  document.querySelectorAll('.option-btn').forEach(b => {
    b.classList.remove('selected');
    const c = b.querySelector('.option-check');
    if (c) c.textContent = '';
  });
  btn.classList.add('selected');
  const c = btn.querySelector('.option-check');
  if (c) c.textContent = '✓';
  document.getElementById('next-btn').disabled = false;
}

function selectEnneagram(n, btn) {
  selected = String(n);
  document.querySelectorAll('.enneagram-btn,.dont-know-btn').forEach(b=>b.classList.remove('selected'));
  btn.classList.add('selected');
  document.getElementById('next-btn').disabled = false;
}

function goBack() {
  if (current === 0) return;
  const card = document.getElementById('card');
  card.classList.add('fade-out');
  setTimeout(() => {
    card.classList.remove('fade-out');
    current--;
    render();
  }, 220);
}

function nextQuestion() {
  if (!selected) return;
  // Store raw selection
  rawSelections[current] = selected;
  // Compute result value
  let val = selected;
  if (questions[current].type === 'enneagram') val = enneagramMap[selected] || 'human';
  answers[current] = val;

  const card = document.getElementById('card');
  card.classList.add('fade-out');
  setTimeout(()=>{
    card.classList.remove('fade-out');
    if (current + 1 >= questions.length) { showResult(); }
    else { current++; render(); }
  }, 280);
}

function getResultKey() {
  const c = {};
  answers.forEach(a => { if (a) c[a] = (c[a] || 0) + 1; });
  return Object.entries(c).sort((a,b) => b[1]-a[1])[0][0];
}

function showResult() {
  const key = getResultKey();
  const r = results[key];
  const content = document.getElementById('quiz-content');
  const card = document.getElementById('card');
  card.style.background = 'linear-gradient(160deg, #fdf8f6, #fceee6)';
  card.style.borderColor = 'rgba(184,124,106,0.25)';

  content.innerHTML = `
    <div class="result-card">
      <p class="result-eyebrow">The results are in — you are most like</p>
      <p class="result-tagline">${r.tagline}</p>
      <h2 class="result-name">${r.name}</h2>
      <div class="result-emoji">${r.emoji}</div>
      <div class="result-ornament">
        <div class="result-ornament-line"></div>
        <div class="result-ornament-diamond"></div>
        <div class="result-ornament-line"></div>
      </div>
      <p class="result-desc">${r.desc}</p>
      <div class="scripture-box">
        <p class="scripture-label">Your anchor verse</p>
        <p class="scripture-text">${r.verse}</p>
        <p class="scripture-ref">${r.ref}</p>
      </div>
      <div class="result-footer">
        <p class="bold-tag">A <span>BOLD</span> · Beautiful Obedient Loving Daughters</p>
        <button class="restart-btn" onclick="restart()">↩ Take the Quiz Again</button>
      </div>
    </div>`;
}

function restart() {
  current = 0;
  answers = new Array(questions.length).fill(null);
  rawSelections = new Array(questions.length).fill(null);
  selected = null;
  const card = document.getElementById('card');
  card.style.background = ''; card.style.borderColor = '';
  render();
}

render();
</script>
</body>
</html>
